# Render: New → Blueprint → connect repo "vidaAllinOne"
# After first deploy, open the service → Environment → add secret values.
services:
  - type: web
    name: vida-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: veda_backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
